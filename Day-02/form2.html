<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Complex Form</h2>

    <form>
        <fieldset>
            <legend>Personal Information</legend>

            <label for="Name">Name</label>
            <input type="text" name="Name" id="Name">

            <label for="Email">Email</label>
            <input type="email" name="Email" id="Email">

            <label for="Phone">Phone</label>
            <input type="tel" name="Phone" id="Phone">

            <label for="DOB">Date of Birth</label>
            <input type="date" name="DOB" id="DOB">

            <label>Gender:</label>

            
            <input type="radio" name="rd" id="rd">
            <label for="rd">Male</label>

            
            <input type="radio" name="rd" id="rd1">
            <label for="rd1">Female</label>
            <br/>

            <label for="country">Country</label>
            <select name="country" id="country">
                <option>United States</option>
                <option>United Kingdom</option>
                <option>India</option>
            </select>
        
        </fieldset>

        <fieldset>
            <legend>Address Street
            <input type="text">

             <label for="city">City</label>
            <input type="text" name="city" id="city">

             <label for="state">State</label>
            <input type="text" name="state" id="state">

             <label for="zip">Zip Code</label>
            <input type="text" name="zip" id="zip">
            </legend>

        </fieldset>

        <fieldset>
            <legend>Other Information</legend>
        
        <label for="comments">Comments</label>
        <textarea name="comments" id="comments" cols="50" rows="6"></textarea>

        <label for="box">I agree to the terms of service</label>
        <input type="checkbox" name="box" id="box">
        </fieldset>

        <input type="submit" name="sub" id="sub" value="Submit">


    </form>
</body>
</html>
