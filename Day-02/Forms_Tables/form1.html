<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Job Application</h2>

    <form>

        <label for="Name">Name:</label>
        <br/>
        <input type="text" name="Name" id="Name">
        <br/>
        <br/>

        <label for="Email">Email:</label>
        <br/>
        <input type="email" name="Email" id="Email">
        <br/>
        <br/>

        <label for="Phone">Phone:</label>
        <br/>
        <input type="tel" name="Phone" id="Phone">
        <br/>
        <br/>

        <label for="File">Resume:</label>
        <br/>
        <input type="file" name="File" id="File">
        <br/>
        <br/>

        <label for="Counter">Experience(in years):</label>
        <br/>
        <input type="number" name="Counter" id="Counter" min="0" max="50">
        <br/>
        <br/>

        <fieldset>
            <legend>Skills:</legend>

        
        <input type="checkbox" name="HTML" id="HTML">
        <br/>
        <label for="HTML">HTML</label>
        <br/>

        <input type="checkbox" name="CSS" id="CSS">
        <br/>
         <label for="CSS">CSS</label>
        <br/>

       
        <input type="checkbox" name="JavaScript" id="JavaScript">
        <br/>
         <label for="JavaScript">JavaScript</label>
         <br/>
            
        </fieldset>
        <br/>

        <label for="Edu">Highest Education:</label>
        <br/>
        <select name="Edu" id="Edu">
            <option value="High School">High School</option>
            <option value="Bachelors">Bachelors</option>
            <option value="Masters">Masters</option>
        </select>
        <br/>
        <br/>


        <label>Availability:</label>
        <br/>
        <br/>

        <input type="radio" name="rd" id="fullTime">
        <br/>
        <label for="fullTime">Full-time:</label>
        <br/>

        
        <input type="radio" name="rd" id="partTime">
        <br/>
        <label for="partTime">Part-time:</label>
        <br/>
        <br/>


        <label for="Area">Additional Comments:</label>
        <br/>
        <textarea name="Area" id="Area" rows="3" cols="100">
            </textarea>


    </form>
</body>
</html>
