<!DOCTYPE html>
<html>
<head>
    <title>Basic Tags</title>
</head>
<body>

    <h1>Main Heading</h1>
    <h2>Sub Heading</h2>
    <h3>Smaller Heading</h3>

    <p>
        This is a paragraph.
        <b>Bold</b>,
        <i>Italic</i>,
        <u>Underline</u>,
        <strike>Strike</strike>,
        <strong>Strong</strong>,
        <em>Emphasized</em>
    </p>

    <p>
        H<sub>2</sub>O <br>
        x<sup>2</sup> + y<sup>2</sup>
    </p>

</body>
</html>
