<!DOCTYPE html>
<html>
<head>
    <title>Lists and Links</title>
</head>
<body>

    <h2>Ordered List</h2>

    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h2>Unordered List</h2>

    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
    </ul>

    <h2>Anchor Tag</h2>

    <a href="https://www.google.com">
        Visit Google
    </a>

</body>
</html>
