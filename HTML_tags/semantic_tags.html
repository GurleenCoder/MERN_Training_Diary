<!DOCTYPE html>
<html>
<head>
    <title>Semantic Tags</title>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        Home | About | Contact
    </nav>

    <main>

        <section>
            <h2>Section Tag</h2>
            <p>This is a section.</p>
        </section>

        <article>
            <h2>Article Tag</h2>
            <p>This is an article.</p>
        </article>

        <aside>
            <h3>Aside Tag</h3>
            <p>Related information.</p>
        </aside>

    </main>

    <footer>
        Copyright 2026
    </footer>

</body>
</html>
