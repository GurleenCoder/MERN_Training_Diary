<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions</title>
    <style>
        .box{
        width:300px;
        height:300px;
        background-color: bisque;
        border:solid 2px black;
        transition-property: all;
        transition-duration: 3s;
        transition-delay: 1s;
        display:flex;
        justify-content:center;
        align-items: center;
        margin-top:85px;
        margin-left:80px;

        }

        .box:hover{
            background-color: aquamarine;
            width:400px;
            height:400px;
        }

        p{
            font-size:25px;
        }


    </style>
</head>
<body>
    <div class="box">
        <p>Hi! I am Gurleen</p>
        
    </div>
</body>
</html>
