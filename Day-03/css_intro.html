<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h1{
            border:solid 3px green;
            box-sizing:border-box;
            width:500px;
            height:100px;
            padding:20px;
            text-align: center;
            margin:20px;
            background-color:bisque;
            color:crimson
        }

        #paraID1{
            border:solid 3px rgb(183, 21, 115);
            box-sizing:border-box;
            width:300px;
            height:50px;
            padding:10px;
            text-align: center;
            margin:20px;
            background-color:beige;
            color:rgb(55, 49, 168)
        }

    </style>
</head>
<body>
    <h1>Introduction to CSS</h1>

    <p id="paraID1">This is a paragraph</p>
    <article class="articleClass">This is an article</article>
    <article class="articleClass">This is another article</article>
    <span>I am using a span tag which is inline.</span>
</body>
</html>
