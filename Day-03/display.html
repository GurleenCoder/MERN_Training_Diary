<!DOCTYPE html>
<html>
<head>
<title>Display Properties</title>
<style>

div{

    border:2px solid red;
    margin:10px;
}

span{

    border:2px solid blue;
}

.inline-block{

    display:inline-block;
    width:150px;
}

</style>

</head>

<body>

<h2>Block Elements</h2>

<div>First Div</div>

<div>Second Div</div>

<h2>Inline Elements</h2>

<span>HTML</span>
<span>CSS</span>

<h2>Inline Block</h2>

<span class="inline-block">Box 1</span>
<span class="inline-block">Box 2</span>

</body>
</html>
